name: PR Build Artifact

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin-core/chat-ui/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: gradle :plugin-core:buildPlugin --no-daemon --quiet

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: agentbridge-plugin
          path: plugin-core/build/distributions/*.zip
          retention-days: 7
