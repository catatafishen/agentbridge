name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions: { }

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Detect which parts of the codebase changed. Downstream jobs use this to
  # skip themselves on PRs when their inputs haven't changed.
  # All jobs always run on push to master regardless of what changed.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      java: ${{ steps.filter.outputs.java }}
      chat_ui: ${{ steps.filter.outputs.chat_ui }}
      mcp_server: ${{ steps.filter.outputs.mcp_server }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            java:
              - 'plugin-core/src/**'
              - '*.gradle*'
              - 'gradle/**'
              - 'buildSrc/**'
              - 'gradle.properties'
            chat_ui:
              - 'plugin-core/chat-ui/**'
              - 'plugin-core/js-tests/**'
            mcp_server:
              - 'mcp-server/**'
              - 'plugin-experimental/**'
              - '*.gradle*'
              - 'gradle/**'
              - 'buildSrc/**'
              - 'gradle.properties'

  mcp-server-tests:
    name: MCP Server Tests
    needs: [ changes ]
    # Always run on push to master. On PRs, skip if neither mcp-server nor
    # plugin-experimental sources changed (e.g. docs-only, workflow-only, or
    # plugin-core-only PR).
    if: github.event_name == 'push' || needs.changes.outputs.mcp_server == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Run MCP server tests
        run: gradle :mcp-server:test :mcp-server:jacocoTestReport --no-daemon --quiet --build-cache

      - name: Upload MCP server coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: mcp-server/build/reports/jacoco/test/jacocoTestReport.xml
          flags: mcp-server
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run plugin-experimental tests
        run: gradle :plugin-experimental:test :plugin-experimental:jacocoTestReport --no-daemon --quiet --build-cache -x :plugin-core:buildChatUi

      - name: Upload plugin-experimental coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: plugin-experimental/build/reports/jacoco/test/jacocoTestReport.xml
          flags: plugin-experimental
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-and-test:
    name: Build & Test
    needs: [ changes ]
    # Always run on push to master. On PRs, skip if neither Java/Kotlin sources
    # nor chat-ui sources changed (e.g. docs-only or workflow-only PR).
    if: github.event_name == 'push' || needs.changes.outputs.java == 'true' || needs.changes.outputs.chat_ui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            plugin-core/chat-ui/package-lock.json
            plugin-core/js-tests/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Install JS test dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/js-tests

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Run chat-ui tests with coverage
        run: npm run test:coverage
        working-directory: plugin-core/js-tests

      - name: Build chat-ui
        run: npm run build
        working-directory: plugin-core/chat-ui

      - name: Build plugins
        run: gradle :plugin-core:buildPlugin :plugin-experimental:buildPlugin --no-daemon --quiet

      - name: Run plugin tests
        run: gradle :plugin-core:test --no-daemon

      - name: Upload chat-ui coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: plugin-core/js-tests/coverage/lcov.info
          flags: chat-ui
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: plugin-core/build/reports/jacoco/test/jacocoTestReport.xml
          flags: plugin-core
          disable_search: true
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Show test failures
        if: failure()
        run: |
          python3 -c "
          import glob, xml.etree.ElementTree as ET
          for path in glob.glob('plugin-core/build/test-results/test/*.xml'):
              root = ET.parse(path).getroot()
              for tc in root.iter('testcase'):
                  for tag in ('failure', 'error'):
                      fail = tc.find(tag)
                      if fail is not None:
                          print('FAILED:', tc.get('classname') + '.' + tc.get('name'))
                          print((fail.get('message') or '') + chr(10) + (fail.text or '')[:3000])
          "

      - name: Upload plugin test results
        # Consumed by the report-test-failures job to post a sticky PR comment.
        # if: always() so the XML rides along even when the test task fails.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: plugin-core-test-xml
          path: plugin-core/build/test-results/test/*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Upload plugin-core artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: plugin-core-pr-${{ github.event.pull_request.number }}
          path: plugin-core/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 7

  # Posts (or refreshes) a sticky PR comment naming the failing unit tests, so a red
  # "Build & Test" run can be triaged from the PR without opening the job log. Mirrors the
  # IDE Compatibility Matrix report job: isolated pull-requests:write permission, sticky
  # comment keyed by an HTML marker. Non-gating — the `ci` aggregator does not depend on it.
  report-test-failures:
    name: Unit Test Report
    needs: [ build-and-test ]
    # Runs whenever the test job actually executed (not when it was skipped on an unrelated
    # PR), so it can post failures on a red run and clear a stale comment on a green one.
    if: always() && needs.build-and-test.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Download plugin test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: plugin-core-test-xml
          path: test-results/
        continue-on-error: true

      - name: Summarize unit test failures
        run: |
          python3 - << 'PYEOF'
          import glob, os, xml.etree.ElementTree as ET

          MARKER = '<!-- unit-test-failures -->'
          xml_files = glob.glob('test-results/**/*.xml', recursive=True)

          failures = []
          for path in xml_files:
              try:
                  root = ET.parse(path).getroot()
              except Exception:
                  continue
              for tc in root.iter('testcase'):
                  for tag in ('failure', 'error'):
                      el = tc.find(tag)
                      if el is None:
                          continue
                      name = (tc.get('classname', '') + '.' + tc.get('name', '')).strip('.')
                      msg = (el.get('message') or '').strip()
                      if not msg and el.text:
                          msg = '\n'.join(el.text.strip().splitlines()[:8])
                      failures.append((name, msg[:1500]))

          # Three states drive the comment step:
          #   fail   — XML present with failing testcases  -> upsert the comment
          #   pass   — XML present, zero failing testcases  -> resolve an existing comment
          #   nodata — no XML at all (e.g. compile error)   -> do nothing
          if not xml_files:
              state = 'nodata'
          elif failures:
              state = 'fail'
          else:
              state = 'pass'

          lines = [MARKER]
          if state == 'fail':
              lines.append(f'## \u274c Unit test failures ({len(failures)})')
              lines.append('')
              lines.append('`gradle :plugin-core:test` reported failing test(s). '
                           'Full logs are in the **Build & Test** job.')
              lines.append('')
              for name, msg in failures:
                  body = msg if msg else '(no message)'
                  lines.append(f'<details>\n<summary>\u274c <code>{name}</code></summary>\n\n'
                               f'```\n{body}\n```\n\n</details>')
          elif state == 'pass':
              lines.append('## \u2705 Unit tests passing')
              lines.append('')
              lines.append('All `plugin-core` unit tests passed on the latest run.')

          with open('/tmp/unit-test-comment.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines) + '\n')
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
              f.write(f'COMMENT_STATE={state}\n')
          print(f'state={state}, failures={len(failures)}, xml_files={len(xml_files)}')
          PYEOF

      - name: Upsert / resolve PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          # Route ${{ }} expansions through env so zizmor's template-injection rule is satisfied.
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # nodata -> the job failed before any test ran (e.g. compile error); nothing to report.
          if [ "$COMMENT_STATE" = "nodata" ]; then
            echo "No test XML — skipping comment."
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR="$PR_NUMBER"
          else
            PR=$(gh pr list -R "$REPO" --head "$REF_NAME" --json number --jq '.[0].number // empty')
          fi
          [ -z "$PR" ] && echo "No associated PR, skipping comment" && exit 0
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- unit-test-failures -->"))] | first | .id // empty')
          # On a green run, only refresh an existing comment — never create a new one.
          if [ "$COMMENT_STATE" = "pass" ] && [ -z "$COMMENT_ID" ]; then
            echo "Tests passing and no prior failure comment — nothing to do."
            exit 0
          fi
          if [ -n "$COMMENT_ID" ]; then
            python3 -c "import json; print(json.dumps({'body': open('/tmp/unit-test-comment.md').read()}))" \
              | gh api -X PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" -R "$REPO" --body-file /tmp/unit-test-comment.md
          fi

  # Aggregator: always runs so branch protection has a stable, unconditional
  # check to require. Upstream jobs may be skipped on PRs that don't touch
  # their respective source paths — this job converts those skips into a single
  # always-present result. Named "Build, Test & Verify" to match the historical
  # check name that GitHub remembers from before the job was split.
  ci:
    name: Build, Test & Verify
    runs-on: ubuntu-latest
    needs: [ mcp-server-tests, build-and-test ]
    if: always()
    permissions: { }
    steps:
      - name: All CI jobs passed or were appropriately skipped
        run: |
          results=("${{ needs.mcp-server-tests.result }}" "${{ needs.build-and-test.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "::error::One or more CI jobs failed or were cancelled (results: ${results[*]})"
              exit 1
            fi
          done
          echo "All CI jobs passed or were appropriately skipped (results: ${results[*]})"
