name: IDE Compatibility Check

# Runs automatically on every push to master and can be triggered manually
# for any branch (e.g. to validate a PR before merging).
#
# Architecture:
#   build-plugin  — compiles and packages the plugin ZIP once
#   verify (×5)   — five parallel jobs, each verifying a single IDE in its own
#                   process with its own isolated copy of JARs. No shared
#                   CachingJarFileSystemProvider, no ClosedFileSystemException.
#                   Verifies: IU 2025.3 (legacy/min), PY 2026.1, WS 2026.1, GO 2026.1,
#                   and IU 2026.1 (latest stable, to catch API removals early).
#
# Results are checked by publish-marketplace.yml: if this workflow has not
# run for a given release commit, or if it failed, marketplace publishing
# is blocked until the check passes.

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to check (leave empty for the default branch)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-plugin:
    name: Build Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Build plugin
        # Skip buildChatUi — the JS/CSS bundle is not needed for API compatibility checks.
        run: gradle :plugin-core:buildPlugin --no-daemon --quiet -x :plugin-core:buildChatUi

      - name: Upload plugin distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: plugin-distribution
          path: plugin-core/build/distributions/*.zip
          retention-days: 1

  verify:
    name: Verify – ${{ matrix.ide.name }}
    needs: build-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        ide:
          - { id: IU, name: "IntelliJ IDEA Ultimate 2025.3 (legacy)" }
          - { id: PY, name: "PyCharm Professional 2026.1" }
          - { id: WS, name: "WebStorm 2026.1" }
          - { id: GO, name: "GoLand 2026.1" }
          - { id: IU-EAP, name: "IntelliJ IDEA Ultimate 2026.2 EAP" }
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520  # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Download plugin distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: plugin-distribution
          path: plugin-core/build/distributions/

      - name: Create pluginVerifier cache directory
        run: mkdir -p ~/.pluginVerifier/extracted-plugins

      - name: Verify plugin against ${{ matrix.ide.name }}
        # -PverifyIde selects a single IDE in pluginVerification.ides so this process
        # owns all its JARs exclusively — no shared CachingJarFileSystemProvider.
        # -x buildPlugin skips rebuilding since the artifact was downloaded above.
        #
        # DO NOT add `--quiet` here. The intellij-platform-gradle-plugin 2.16.0
        # verifyPlugin task suppresses the failureLevel check when Gradle log level
        # is QUIET: the task exits 0 with no output even when INTERNAL_API_USAGES,
        # DEPRECATED_API_USAGES, etc. are detected. Confirmed 2026-07-13 by
        # reproducing locally with a known @ApiStatus.Internal call: `--quiet`
        # → exit 0, silent; no `--quiet` → task fails with the expected report.
        # An internal-API usage slipped past this workflow into a Marketplace
        # release because of that silent-suppression bug.
        run: >
          gradle :plugin-core:verifyPlugin
          --no-daemon
          -PverifyIde=${{ matrix.ide.id }}
          -x :plugin-core:buildPlugin
          -x :plugin-core:buildChatUi

      - name: Show disk space after verification
        if: always()
        run: df -h /

