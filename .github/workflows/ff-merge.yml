name: Fast-Forward Merge

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to fast-forward merge"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  ff-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          PR=$(gh api "/repos/$REPO/pulls/$PR_NUMBER")
          STATE=$(echo "$PR" | jq -r '.state')
          if [ "$STATE" != "open" ]; then
            echo "❌ PR #$PR_NUMBER is not open (state: $STATE)"
            exit 1
          fi
          echo "base=$(echo "$PR" | jq -r '.base.ref')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

      - name: Check fast-forward feasibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE: ${{ steps.pr.outputs.base }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          COMPARE=$(gh api "/repos/$REPO/compare/$BASE...$HEAD_SHA")
          BEHIND=$(echo "$COMPARE" | jq -r '.behind_by')
          if [ "$BEHIND" != "0" ]; then
            echo "❌ Branch is $BEHIND commit(s) behind '$BASE'."
            echo "   Rebase locally to preserve commit hashes and signatures:"
            echo "   git fetch origin && git rebase origin/$BASE && git push --force-with-lease"
            exit 1
          fi

      - name: Fast-forward merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE: ${{ steps.pr.outputs.base }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          gh api --method PATCH \
            "/repos/$REPO/git/refs/heads/$BASE" \
            -f sha="$HEAD_SHA" \
            -F force=false
          echo "✅ Fast-forwarded '$BASE' to $HEAD_SHA"
