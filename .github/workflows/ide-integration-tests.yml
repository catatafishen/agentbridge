name: IDE Integration Bench (spike)

# High-fidelity bench: launches a REAL IDE (CLion) via the IntelliJ Platform Starter
# framework, opens a committed fixture project so the real language backend starts, and
# drives the plugin's MCP server over HTTP. Unlike ide-compat-tests (headless), this can
# actually exercise CLion Nova / Rider backends.
#
# SPIKE STATUS: NON-GATING while we validate that the commercial IDE backend starts under
# xvfb in CI (the make-or-break question). It runs on PRs that touch the bench so we get a
# real CI result, but it is a brand-new check (not in branch protection) so it reports status
# without blocking merge. Once proven, it expands to the full IDE × tool matrix.

on:
  workflow_dispatch:
    inputs:
      clionVersion:
        description: "CLion version for the Starter framework to download"
        required: false
        default: "2026.1"
  pull_request:
    branches: [ master ]
    paths:
      - 'ide-integration-tests/**'
      - 'fixtures/**'
      - 'plugin-core/src/main/**'
      - '.github/workflows/ide-integration-tests.yml'

permissions: { }

concurrency:
  group: ide-integration-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLION_VERSION: ${{ github.event.inputs.clionVersion || '2026.1' }}

jobs:
  integration:
    name: IDE Integration (CL)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

      # The plugin ZIP bundles the chat UI, built by :plugin-core:buildChatUi (npm run build).
      # Build the COMPLETE plugin so it loads cleanly in the launched IDE — a half-built plugin
      # could fail to initialize and produce a misleading "backend never started" result.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: plugin-core/chat-ui/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244  # v4.3.1
        with:
          gradle-version: 'wrapper'
          gradle-home-cache-includes: |
            caches
            notifications

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build plugin ZIP
        run: gradle :plugin-core:buildPlugin --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Resolve plugin ZIP path
        id: zip
        run: echo "path=$(ls -t plugin-core/build/distributions/*.zip | head -1)" >> "$GITHUB_OUTPUT"

      - name: Run integration bench (CLion) under xvfb
        run: >
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24"
          gradle :ide-integration-tests:integrationTest
          -Ppath.to.build.plugin=${{ steps.zip.outputs.path }}
          -PclionPlatformVersion=${{ env.CLION_VERSION }}
          --no-daemon
          --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Collect IDE logs (CLion ${{ env.CLION_VERSION }})
        if: always()
        # The Starter framework writes IDE output under out/ide-tests/tests/<product>-<build>/<testName>/.
        # Collect idea.log for each test run and produce a smaller plugin-specific excerpt
        # (agentbridge/error/exception lines only) so the relevant signal is easy to find.
        run: |
          OUT="ide-logs-CLion-${{ env.CLION_VERSION }}"
          mkdir -p "$OUT"
          find out/ide-tests/tests -name "idea.log" 2>/dev/null | while IFS= read -r f; do
            test_name=$(basename "$(dirname "$(dirname "$f")")")
            cp "$f" "$OUT/${test_name}-idea.log" 2>/dev/null || true
            grep -iE "(agentbridge|mcpserver|psibridgestartup|autostart|psibridgeservice)" "$f" \
              > "$OUT/${test_name}-plugin-excerpt.log" 2>/dev/null || true
          done
        continue-on-error: true

      - name: Upload IDE logs (CLion ${{ env.CLION_VERSION }})
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: ide-logs-CLion-${{ env.CLION_VERSION }}
          # Full idea.log + agentbridge-specific excerpt per test run.
          path: ide-logs-CLion-${{ env.CLION_VERSION }}/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: integration-test-reports
          path: |
            ide-integration-tests/build/reports/
            ide-integration-tests/build/test-results/
          retention-days: 14
          if-no-files-found: warn
