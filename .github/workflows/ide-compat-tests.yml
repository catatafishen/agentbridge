name: IDE Compatibility Tests

on:
  push:
    branches: [ master, 'test/ide-compat-matrix' ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  workflow_dispatch:

permissions: { }

concurrency:
  group: ide-compat-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compat-tests:
    name: IDE Compat (${{ matrix.ide }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ide: IU
            platformType: IU
          - ide: CL
            platformType: CL
          - ide: RD
            platformType: RD

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244  # v4.3.1
        with:
          gradle-version: 'wrapper'
          # Cache Gradle home (includes downloaded IDE distributions) across runs
          gradle-home-cache-includes: |
            caches
            notifications

      - name: Run IDE compat tests (${{ matrix.ide }})
        run: >
          gradle :ide-compat-tests:test
          -PtestPlatformType=${{ matrix.platformType }}
          -x :plugin-core:buildChatUi
          --no-daemon
          --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: test-results-${{ matrix.ide }}
          path: ide-compat-tests/build/reports/tests/test/
          retention-days: 14

      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: test-xml-${{ matrix.ide }}
          path: ide-compat-tests/build/test-results/test/
          retention-days: 14

  report:
    name: Compatibility Matrix
    needs: compat-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download XML test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test-xml-*
          path: test-results/
          merge-multiple: false
        continue-on-error: true

      - name: Generate compatibility matrix
        run: |
          python3 - << 'PYEOF'
          import os, glob, re, xml.etree.ElementTree as ET

          # Tool groups matching the bug-inventory sections in docs/bugs/issue-794-bug-inventory.md.
          # Each tool name maps to a *CompatTest class (e.g. 'search_symbols' →
          # SearchSymbolsCompatTest). Tools with no test class yet show ❓ in the matrix.
          # Add the test class later; the row appears automatically once the first CI run picks
          # up the new XML. Add new tools here when they are added to the plugin.
          TOOL_GROUPS = [
              ('PSI / Navigation', [
                  'search_symbols',
                  'get_file_outline',
                  'find_references',
                  'go_to_declaration',
                  'get_documentation',
                  'get_symbol_info',
                  'get_class_outline',
              ]),
              ('Code Quality', [
                  'get_highlights',
                  'get_problems',
                  'get_compilation_errors',
                  'get_available_actions',
                  'apply_action',
                  'apply_quickfix',
                  'format_code',
                  'optimize_imports',
                  'suppress_inspection',
              ]),
              ('Refactoring', [
                  'get_type_hierarchy',
                  'get_call_hierarchy',
                  'find_implementations',
                  'find_super_methods',
                  'refactor',
                  'convert_java_to_kotlin',
              ]),
              ('Testing', [
                  'run_tests',
                  'list_tests',
                  'run_configuration',
                  'get_coverage',
              ]),
              ('Debug', [
                  'debug_session_start',
                  'breakpoint_manage',
                  'debug_evaluate',
                  'debug_snapshot',
                  'debug_inspect_frame',
                  'debug_variable_detail',
                  'debug_read_console',
                  'debug_step',
                  'debug_run_to_line',
              ]),
              ('Build', [
                  'read_build_output',
                  'reload_project_model',
              ]),
          ]
          EXPECTED_TOOLS = {t for _, tools in TOOL_GROUPS for t in tools}

          def class_to_tool(short):
              """'SearchSymbols' → 'search_symbols'"""
              s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', short)
              s = re.sub(r'([a-z\d])([A-Z])', r'\1_\2', s)
              return s.lower()

          results = {}
          failure_details = {}

          for artifact_dir in sorted(glob.glob('test-results/test-xml-*')):
              ide = artifact_dir.split('test-xml-')[1]
              results[ide] = {}
              failure_details[ide] = {}
              for xml_file in glob.glob(f'{artifact_dir}/**/*.xml', recursive=True):
                  try:
                      tree = ET.parse(xml_file)
                      root = tree.getroot()
                  except Exception:
                      continue
                  for testcase in root.iter('testcase'):
                      classname = testcase.get('classname', '')
                      short = classname.split('.')[-1]
                      if not short.endswith('CompatTest'):
                          continue
                      tool = class_to_tool(re.sub(r'CompatTest$', '', short))
                      if tool not in EXPECTED_TOOLS:
                          continue
                      failure_el = testcase.find('failure')
                      error_el = testcase.find('error')
                      prev = results[ide].get(tool)
                      if failure_el is not None or error_el is not None:
                          results[ide][tool] = 'fail'
                          el = failure_el if failure_el is not None else error_el
                          msg = el.get('message', '') or ''
                          if not msg and el.text:
                              msg = '\n'.join(el.text.strip().splitlines()[:5])
                          test_name = testcase.get('name', tool)
                          failure_details[ide].setdefault(tool, []).append((test_name, msg[:500]))
                      elif prev != 'fail':
                          results[ide][tool] = 'pass'

          if not results:
              summary = '## IDE Compatibility Matrix\n\n_No test results found._\n'
          else:
              status_map = {'pass': '✅', 'fail': '❌', None: '❓'}
              ides = sorted(results.keys())

              lines = ['## IDE Compatibility Matrix', '']
              lines.append('`✅` pass  `❌` fail  `❓` not implemented yet')
              lines.append('')
              lines.append('| Tool | ' + ' | '.join(ides) + ' |')
              lines.append('|------|' + '|'.join(['---'] * len(ides)) + '|')
              for group, tools in TOOL_GROUPS:
                  lines.append(f'| **{group}** | ' + ' | '.join(['&nbsp;'] * len(ides)) + ' |')
                  for tool in tools:
                      cells = [status_map.get(results[ide].get(tool)) for ide in ides]
                      lines.append(f'| `{tool}` | ' + ' | '.join(cells) + ' |')

              any_failures = any(v == 'fail' for r in results.values() for v in r.values())
              if any_failures:
                  lines.append('')
                  lines.append('### Failures')
                  for ide in ides:
                      for tool in sorted(failure_details[ide]):
                          for test_name, msg in failure_details[ide][tool]:
                              lines.append(
                                  f'\n<details>\n<summary>❌ {ide} — {tool} — {test_name}'
                                  f'</summary>\n\n```\n{msg}\n```\n\n</details>'
                              )

              summary = '\n'.join(lines) + '\n'

          print(summary)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary)
          with open('/tmp/compat-matrix.md', 'w') as f:
              f.write('<!-- compat-matrix -->\n')
              f.write(summary)
          PYEOF

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR="${{ github.event.pull_request.number }}"
          else
            PR=$(gh pr list -R "${{ github.repository }}" --head "${{ github.ref_name }}" --json number --jq '.[0].number // empty')
          fi
          [ -z "$PR" ] && echo "No associated PR, skipping comment" && exit 0
          REPO="${{ github.repository }}"
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- compat-matrix -->"))] | first | .id // empty')
          if [ -n "$COMMENT_ID" ]; then
            python3 -c "import json; print(json.dumps({'body': open('/tmp/compat-matrix.md').read()}))" \
              | gh api -X PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" -R "$REPO" --body-file /tmp/compat-matrix.md
          fi
