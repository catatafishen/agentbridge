name: IDE Compatibility Tests

on:
  push:
    branches: [ master, 'test/ide-compat-matrix' ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  workflow_dispatch:

permissions: { }

concurrency:
  group: ide-compat-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compat-tests:
    name: IDE Compat (${{ matrix.ide }})
    runs-on: ubuntu-latest
    # CLion job is informational until bug #1b (search_symbols wildcard for CLion Nova C++) is fixed.
    # The job will show as failed in the UI but will not block the PR.
    continue-on-error: ${{ matrix.ide == 'CL' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - ide: IU
            platformType: IU
          - ide: CL
            platformType: CL

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244  # v4.3.1
        with:
          # Cache IDE distributions to avoid downloading on every run
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications

      - name: Run IDE compat tests (${{ matrix.ide }})
        run: >
          ./gradlew :ide-compat-tests:test
          -PtestPlatformType=${{ matrix.platformType }}
          --no-daemon
          --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: test-results-${{ matrix.ide }}
          path: ide-compat-tests/build/reports/tests/test/
          retention-days: 14
