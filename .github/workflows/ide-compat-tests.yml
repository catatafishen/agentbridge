name: IDE Compatibility Tests

on:
  push:
    branches: [ master, 'test/ide-compat-matrix' ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'ide-compat-tests/**'
      - 'plugin-core/src/main/**'
      - 'gradle.properties'
      - '*.gradle*'
      - 'gradle/**'
      - '.github/workflows/ide-compat-tests.yml'
  workflow_dispatch:

permissions: { }

concurrency:
  group: ide-compat-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compat-tests:
    name: IDE Compat (${{ matrix.ide }})
    runs-on: ubuntu-latest
    # CLion job is informational until bug #1b (search_symbols wildcard for CLion Nova C++) is fixed.
    # The job will show as failed in the UI but will not block the PR.
    continue-on-error: ${{ matrix.ide == 'CL' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - ide: IU
            platformType: IU
          - ide: CL
            platformType: CL

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b  # v4.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244  # v4.3.1
        with:
          gradle-version: 'wrapper'
          # Cache Gradle home (includes downloaded IDE distributions) across runs
          gradle-home-cache-includes: |
            caches
            notifications

      - name: Run IDE compat tests (${{ matrix.ide }})
        run: >
          gradle :ide-compat-tests:test
          -PtestPlatformType=${{ matrix.platformType }}
          -x :plugin-core:buildChatUi
          --no-daemon
          --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: test-results-${{ matrix.ide }}
          path: ide-compat-tests/build/reports/tests/test/
          retention-days: 14

      - name: Upload XML test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: test-xml-${{ matrix.ide }}
          path: ide-compat-tests/build/test-results/test/
          retention-days: 14

  report:
    name: Compatibility Matrix
    needs: compat-tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download XML test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test-xml-*
          path: test-results/
          merge-multiple: false
        continue-on-error: true

      - name: Generate compatibility matrix
        run: |
          python3 - << 'PYEOF'
          import os, glob, re, xml.etree.ElementTree as ET

          results = {}
          failure_details = {}
          all_classes = set()

          for artifact_dir in sorted(glob.glob('test-results/test-xml-*')):
              ide = artifact_dir.split('test-xml-')[1]
              results[ide] = {}
              failure_details[ide] = {}
              for xml_file in glob.glob(f'{artifact_dir}/**/*.xml', recursive=True):
                  try:
                      tree = ET.parse(xml_file)
                      root = tree.getroot()
                  except Exception:
                      continue
                  for testcase in root.iter('testcase'):
                      classname = testcase.get('classname', '')
                      short = classname.split('.')[-1]
                      short = re.sub(r'CompatTest$', '', short)
                      if not short:
                          continue
                      all_classes.add(short)
                      failure_el = testcase.find('failure')
                      error_el = testcase.find('error')
                      has_skipped = testcase.find('skipped') is not None
                      prev = results[ide].get(short, 'pass')
                      if failure_el is not None or error_el is not None:
                          results[ide][short] = 'fail'
                          el = failure_el if failure_el is not None else error_el
                          msg = el.get('message', '') or ''
                          if not msg and el.text:
                              msg = '\n'.join(el.text.strip().splitlines()[:5])
                          test_name = testcase.get('name', short)
                          failure_details[ide].setdefault(short, []).append((test_name, msg[:500]))
                      elif has_skipped and prev == 'pass':
                          results[ide][short] = 'skip'

          if not results:
              summary = '## IDE Compatibility Matrix\n\n_No test results found._\n'
          else:
              def to_column(name):
                  s = re.sub(r'([A-Z]+)([A-Z][a-z])', r'\1_\2', name)
                  s = re.sub(r'([a-z\d])([A-Z])', r'\1_\2', s)
                  return s.lower()

              cols = sorted(all_classes, key=to_column)
              col_headers = [to_column(c) for c in cols]
              status_map = {'pass': '✅', 'fail': '❌', 'skip': '⚠️'}

              lines = ['## IDE Compatibility Matrix', '']
              lines.append('| IDE | ' + ' | '.join(col_headers) + ' |')
              lines.append('|-----|' + '|'.join(['---'] * len(cols)) + '|')
              for ide in sorted(results.keys()):
                  cells = [status_map.get(results[ide].get(cls), '—') for cls in cols]
                  lines.append(f'| {ide} | ' + ' | '.join(cells) + ' |')

              any_failures = any(v == 'fail' for ide_r in results.values() for v in ide_r.values())
              if any_failures:
                  lines.append('')
                  lines.append('### Failures')
                  for ide in sorted(failure_details.keys()):
                      for short_cls in sorted(failure_details[ide].keys()):
                          col = to_column(short_cls)
                          for test_name, msg in failure_details[ide][short_cls]:
                              lines.append(f'\n<details>\n<summary>❌ {ide} — {col} — {test_name}</summary>\n\n```\n{msg}\n```\n\n</details>')

              summary = '\n'.join(lines) + '\n'

          print(summary)
          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary)
          with open('/tmp/compat-matrix.md', 'w') as f:
              f.write('<!-- compat-matrix -->\n')
              f.write(summary)
          PYEOF

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- compat-matrix -->"))] | first | .id // empty')
          if [ -n "$COMMENT_ID" ]; then
            python3 -c "import json; print(json.dumps({'body': open('/tmp/compat-matrix.md').read()}))" \
              | gh api -X PATCH "repos/${REPO}/issues/comments/${COMMENT_ID}" --input -
          else
            gh pr comment "$PR" -R "$REPO" --body-file /tmp/compat-matrix.md
          fi
