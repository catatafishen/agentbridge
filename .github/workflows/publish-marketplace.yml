name: Publish to JetBrains Marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (leave empty for latest release)'
        required: false
        type: string
        default: ''
      channel:
        description: 'Marketplace channel (leave as "stable" for production releases)'
        required: true
        type: choice
        options:
          - stable
          - eap
          - beta
        default: stable

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Step 0: Resolve release tag ──────────────────────────────────────
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Resolve tag from input or latest release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "Using provided tag: $INPUT_TAG"
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 5 \
              --json tagName,isPrerelease,isDraft \
              --jq '[.[] | select(.isPrerelease == false and .isDraft == false)][0].tagName')
            if [ -z "$LATEST" ]; then
              echo "::error::No releases found. Please specify a tag manually."
              exit 1
            fi
            echo "No tag provided — using latest release: $LATEST"
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Show recent releases for reference
        env:
          GH_TOKEN: ${{ github.token }}
          SELECTED_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          echo "### 🏷️ Recent releases" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Date | Title |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 10 \
            --json tagName,publishedAt,name \
            --jq '.[] | "| \(.tagName) | \(.publishedAt | split("T")[0]) | \(.name) |"' \
            >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Selected:** \`$SELECTED_TAG\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Step 1: Preview current release notes ────────────────────────────
  # Shows the current GitHub Release body so you know what you're working with.
  # Edit the release notes on GitHub, THEN approve the gate below.
  preview:
    name: Preview release notes for ${{ needs.resolve-tag.outputs.tag }}
    needs: resolve-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Display release notes and edit link
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq '.body' > release-body.md

          EDIT_URL="https://github.com/$GITHUB_REPOSITORY/releases/edit/$RELEASE_TAG"

          {
            echo "## ⚠️ Edit release notes BEFORE approving the next gate"
            echo ""
            echo "1. [**Edit the release notes on GitHub →**]($EDIT_URL)"
            echo "2. Modify the body as needed and **Save**"
            echo "3. Come back here and approve the **marketplace-ready** gate"
            echo "   *(the next job re-fetches your saved version)*"
            echo ""
            echo "---"
            echo ""
            echo "### 📝 Current release body for \`$RELEASE_TAG\`"
            echo ""
            cat release-body.md
            echo ""
            echo "---"
            echo ""
            echo "**Channel:** \`$CHANNEL\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Step 2: Confirm notes (gate 1 — 'marketplace-ready' environment) ──
  # Approve this gate once you've finished editing the release notes.
  # This job re-fetches your saved notes and converts them to the HTML that
  # will be embedded in the marketplace listing.
  confirm-notes:
    name: Fetch final notes and convert to HTML
    needs: [ resolve-tag, preview ]
    runs-on: ubuntu-latest
    environment: marketplace-ready
    permissions:
      contents: read
    outputs:
      changelog-html: ${{ steps.convert.outputs.changelog-html }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Re-fetch release notes (captures any edits you just saved)
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json body --jq '.body' > release-body.md
          echo "Fetched release body ($(wc -c < release-body.md) bytes)"

      - name: Convert GFM to HTML via GitHub Markdown API
        id: convert
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Uses GitHub's own Markdown API — identical rendering to what GitHub shows,
          # no pandoc dependency (not available on ubuntu-24.04 runners).
          python3 - <<'PYEOF'
          import json, subprocess, os, re

          body = open('release-body.md').read()
          payload = json.dumps({
              'text': body,
              'mode': 'gfm',
              'context': os.environ.get('GITHUB_REPOSITORY', ''),
          })
          result = subprocess.run(
              ['gh', 'api', '/markdown', '--input', '-'],
              input=payload.encode(),
              capture_output=True,
              check=True,
          )
          html = result.stdout.decode()

          # Strip <details>/<summary> wrappers — the JetBrains Marketplace may not render them.
          html = re.sub(r'<details[^>]*>', '', html)
          html = html.replace('</details>', '')
          html = re.sub(r'<summary[^>]*>.*?</summary>', '', html, flags=re.DOTALL)

          open('release-body.html', 'w').write(html)
          PYEOF

          # Assemble: static header + converted release notes
          {
            printf '<p><b>AgentBridge</b> connects AI coding agents to your IDE via 100+ MCP tools\n'
            printf 'for code intelligence, navigation, editing, debugging, and git.</p>\n'
            printf '<p>\n'
            printf '  <a href="https://github.com/%s">GitHub</a> &middot;\n' "$GITHUB_REPOSITORY"
            printf '  <a href="https://github.com/%s/releases">All Releases</a>\n' "$GITHUB_REPOSITORY"
            printf '</p>\n'
            printf '<hr/>\n'
            cat release-body.html
          } > marketplace-changelog.html

          # Pass HTML to the upload job via outputs (base64 to survive newlines)
          B64=$(base64 -w0 marketplace-changelog.html)
          echo "changelog-html=$B64" >> "$GITHUB_OUTPUT"

      - name: Show final HTML that will be uploaded
        run: |
          {
            echo "### ✅ Final HTML ready for upload"
            echo ""
            echo "Review this — if it looks correct, approve the **marketplace** gate."
            echo ""
            echo '```html'
            cat marketplace-changelog.html
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Step 3: Upload (gate 2 — 'marketplace' environment) ──────────────
  # Approve this gate after reviewing the HTML shown in the previous job's summary.
  # Once approved, the plugin ZIP is patched and uploaded. No further edits possible.
  upload:
    name: Upload ${{ needs.resolve-tag.outputs.tag }} to JetBrains Marketplace
    needs: [ resolve-tag, confirm-notes ]
    runs-on: ubuntu-latest
    environment: marketplace
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download plugin ZIP from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "agentbridge-*.zip" \
            --dir release-artifacts
          ls -la release-artifacts/

      - name: Restore changelog HTML from previous job
        env:
          CHANGELOG_B64: ${{ needs.confirm-notes.outputs.changelog-html }}
        run: |
          echo "$CHANGELOG_B64" | base64 -d > marketplace-changelog.html
          echo "Restored $(wc -c < marketplace-changelog.html) bytes of changelog HTML"

      - name: Patch plugin ZIP with changelog HTML
        run: |
          PLUGIN_ZIP=$(ls release-artifacts/agentbridge-*.zip | head -1)
          echo "Patching: $PLUGIN_ZIP"

          mkdir -p work/plugin
          unzip -o -q "$PLUGIN_ZIP" -d work/plugin

          MAIN_JAR=$(find work/plugin -name '*.jar' -exec \
            sh -c 'unzip -l "$1" META-INF/plugin.xml >/dev/null 2>&1 && echo "$1"' _ {} \; \
            | head -1)

          if [[ -z "$MAIN_JAR" ]]; then
            echo "::error::Could not find plugin JAR with META-INF/plugin.xml"
            exit 1
          fi
          echo "Plugin JAR: $MAIN_JAR"

          mkdir -p work/xml/META-INF
          unzip -o -q "$MAIN_JAR" META-INF/plugin.xml -d work/xml

          python3 - <<'PYEOF'
          import re

          with open('work/xml/META-INF/plugin.xml') as f:
              xml = f.read()

          with open('marketplace-changelog.html') as f:
              notes = f.read()

          patched = re.sub(
              r'<change-notes>.*?</change-notes>',
              '<change-notes><![CDATA[\n' + notes + '\n]]></change-notes>',
              xml, flags=re.DOTALL
          )

          if patched == xml:
              print('::warning::No <change-notes> section found — changelog not patched')
          else:
              print('Patched <change-notes> section in plugin.xml')

          with open('work/xml/META-INF/plugin.xml', 'w') as f:
              f.write(patched)
          PYEOF

          MAIN_JAR_ABS=$(realpath "$MAIN_JAR")
          (cd work/xml && zip -q "$MAIN_JAR_ABS" META-INF/plugin.xml)

          PATCHED_ZIP="patched-$(basename "$PLUGIN_ZIP")"
          (cd work/plugin && zip -r -q "../../$PATCHED_ZIP" .)

          rm -rf release-artifacts
          mkdir release-artifacts
          mv "$PATCHED_ZIP" "release-artifacts/$(basename "$PLUGIN_ZIP")"
          echo "Patched ZIP ready: release-artifacts/$(basename "$PLUGIN_ZIP")"

      - name: Upload to JetBrains Marketplace
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          PLUGIN_ZIP=$(ls release-artifacts/agentbridge-*.zip | head -1)
          echo "Uploading: $PLUGIN_ZIP to channel '${CHANNEL}'"

          CURL_ARGS=(
            --header "Authorization: Bearer $JETBRAINS_TOKEN"
            -F "xmlId=com.github.catatafishen.ideagentforcopilot"
            -F "file=@$PLUGIN_ZIP"
          )
          if [ "$CHANNEL" != "stable" ]; then
            CURL_ARGS+=(-F "channel=$CHANNEL")
          fi

          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" "${CURL_ARGS[@]}" \
            https://plugins.jetbrains.com/plugin/uploadPlugin)

          echo "--- Marketplace response ---"
          cat response.txt
          echo ""

          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
            echo "Upload failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
          echo "Successfully published $PLUGIN_ZIP to the JetBrains Marketplace"

      - name: Update marketplace-latest tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh auth setup-git
          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          git tag -f marketplace-latest "$TARGET_SHA"
          git push origin marketplace-latest --force
          echo "Updated marketplace-latest → $TARGET_SHA ($RELEASE_TAG)"

      - name: Tag release as pending marketplace review
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/git/refs" --jq \
            '.[] | select(.ref | startswith("refs/tags/marketplace-pending-")) | .ref' \
            | while read -r REF; do
                gh api "repos/$GITHUB_REPOSITORY/git/$REF" -X DELETE
                echo "Removed stale tag: $REF"
              done

          TARGET_SHA=$(git rev-list -n1 "$RELEASE_TAG")
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -a "marketplace-pending-$RELEASE_TAG" "$TARGET_SHA" \
            -m "Pending JetBrains Marketplace review for $RELEASE_TAG"
          git push origin "marketplace-pending-$RELEASE_TAG"
          echo "Tagged $RELEASE_TAG as pending marketplace review"
