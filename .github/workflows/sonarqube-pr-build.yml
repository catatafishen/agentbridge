name: SonarQube PR Build

# Unprivileged half of the fork-PR SonarQube pipeline.
#
# Security model:
#   pull_request events for fork PRs have NO access to repository secrets.
#   It is therefore safe to check out and build untrusted fork code here.
#   The compiled classes, coverage reports, and source files are bundled
#   into an artifact and consumed by the companion sonarqube-pr-analyze.yml
#   workflow, which runs in a privileged context but never executes fork code.
#
# See docs/CI-SECURITY.md for the full rationale.

on:
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read

concurrency:
  group: sonarqube-build-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      # Checks out the fork's actual head commit (not the merge commit) so the
      # SonarQube analysis covers exactly the code in the PR. Safe here because
      # pull_request events have no access to repository secrets.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            plugin-core/chat-ui/package-lock.json
            plugin-core/js-tests/package-lock.json

      - name: Install chat-ui dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/chat-ui

      - name: Install JS test dependencies
        run: npm ci --silent --ignore-scripts
        working-directory: plugin-core/js-tests

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Run tests with coverage
        run: |
          npm run test:coverage --prefix plugin-core/js-tests
          # Normalize LCOV source paths: vitest outputs relative to js-tests/,
          # but SonarCloud resolves relative to plugin-core/ module root.
          sed -i 's|^SF:\.\./|SF:|' plugin-core/js-tests/coverage/lcov.info
          npm run build --prefix plugin-core/chat-ui
          # --continue: run every module's tests even if an earlier one fails, so the
          # JUnit XML reports are complete and the analyze workflow can list every
          # failed test name in its PR comment instead of stopping at the first failure.
          gradle :mcp-server:test :mcp-server:jacocoTestReport \
            :plugin-experimental:test :plugin-experimental:jacocoTestReport \
            :plugin-core:test :plugin-core:jacocoTestReport \
            --no-daemon --quiet --build-cache --continue

      - name: Package analysis artifacts
        # Runs even when tests failed (if: always) so the JUnit XML reports reach the
        # privileged analyze workflow, which posts the failed-test names as a PR comment.
        # Sources are NOT included — sonarqube-pr-analyze.yml restores them
        # directly from the PR commit via `git checkout` so that
        # SCM blame works and SonarCloud can identify "new code". Including
        # sources here would just be overwritten and break SCM resolution.
        # Coverage outputs that live inside source trees (js-tests/coverage)
        # are still included so the analyze job picks them up after the
        # source restore. Each path is added only when it exists so a compile
        # failure (no classes) still produces a usable artifact.
        if: ${{ !cancelled() }}
        run: |
          ARTIFACT_PATHS=()
          for p in \
            plugin-core/build/reports/jacoco plugin-core/build/classes plugin-core/build/test-results \
            plugin-core/js-tests/coverage \
            mcp-server/build/reports/jacoco mcp-server/build/classes mcp-server/build/test-results \
            plugin-experimental/build/reports/jacoco plugin-experimental/build/classes plugin-experimental/build/test-results; do
            [ -e "$p" ] && ARTIFACT_PATHS+=("$p")
          done
          tar -czf sonar-artifacts.tar.gz \
            --exclude='*/node_modules' \
            --exclude='*/lcov-report' \
            "${ARTIFACT_PATHS[@]}"

      - name: Upload analysis artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sonar-analysis-artifacts
          path: sonar-artifacts.tar.gz
          retention-days: 1
          if-no-files-found: error
