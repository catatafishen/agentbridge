name: Fuzz Testing

on:
  schedule:
    - cron: '0 4 * * 6'  # Weekly on Saturday at 04:00 UTC
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration per target (seconds)'
        required: false
        default: '120'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fuzz:
    name: Jazzer Fuzz Targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-version: 'wrapper'
          cache-disabled: true

      - name: Build test classpath
        run: gradle :plugin-core:testClasses :mcp-server:testClasses --no-daemon --quiet

      - name: Download Jazzer
        env:
          JAZZER_VERSION: '0.22.0'
        run: |
          curl --proto "=https" -sSfL -o jazzer.tar.gz \
            "https://github.com/CodeIntelligenceTesting/jazzer/releases/download/v${JAZZER_VERSION}/jazzer-linux.tar.gz"
          mkdir -p jazzer-bin
          tar xzf jazzer.tar.gz -C jazzer-bin
          echo "$PWD/jazzer-bin" >> "$GITHUB_PATH"

      - name: Resolve test classpath
        id: classpath
        run: |
          CP_CORE=$(gradle :plugin-core:printFuzzClasspath --no-daemon -q | tail -1)
          CP_MCP=$(gradle :mcp-server:printFuzzClasspath --no-daemon -q | tail -1)
          echo "cp=${CP_CORE}:${CP_MCP}" >> "$GITHUB_OUTPUT"

      - name: Run Jazzer fuzz targets
        env:
          FUZZ_CLASSPATH: ${{ steps.classpath.outputs.cp }}
          FUZZ_DURATION: ${{ inputs.duration || '120' }}
        run: |
          TARGETS=(
            com.github.catatafishen.agentbridge.fuzz.AgentIdMapperFuzz
            com.github.catatafishen.agentbridge.fuzz.MarkdownRendererFuzz
            com.github.catatafishen.agentbridge.fuzz.TimeArgParserFuzz
            com.github.catatafishen.agentbridge.fuzz.AbuseDetectorFuzz
            com.github.catatafishen.agentbridge.fuzz.NewSessionResponseFuzz
            com.github.catatafishen.agentbridge.fuzz.JunitXmlParserFuzz
            com.github.copilot.mcp.McpStdioProxyFuzz
          )
          FAILED=0

          for target in "${TARGETS[@]}"; do
            echo "::group::Fuzzing $target (${FUZZ_DURATION}s)"
            # Jazzer returns non-zero if it finds a crash within the time limit.
            # timeout returns 124 on expiry, which is a clean exit (no crash found).
            if timeout "${FUZZ_DURATION}" jazzer \
                --cp="$FUZZ_CLASSPATH" \
                --target_class="$target" \
                --keep_going=5 2>&1; then
              echo "✅ $target: no issues found"
            else
              EXIT=$?
              if [ "$EXIT" -eq 124 ]; then
                echo "✅ $target: clean (timeout, no crashes)"
              else
                echo "❌ $target: Jazzer found an issue (exit $EXIT)"
                FAILED=1
              fi
            fi
            echo "::endgroup::"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more fuzz targets found issues"
            exit 1
          fi
